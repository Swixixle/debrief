name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  node-tests:
    name: Node.js Tests (Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: TypeScript error count gate (server + shared)
        run: |
          COUNT=$(npx tsc --project tsconfig.server.json --noEmit 2>&1 | grep -c "error TS" || echo 0)
          BASELINE=142
          echo "TS errors (server+shared): $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "TypeScript error count increased. Fix new errors before merging."
            exit 1
          fi

  smoke-test:
    name: Smoke Test (PTA Analyzer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt || true  # adjust if using poetry/uv

      - name: Preflight (compile + tests)
        run: bash scripts/preflight.sh

      - name: Install editable Python package
        run: pip install -e .

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run smoke test
        run: npm run smoke

      - name: Upload smoke test outputs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-test-outputs
          path: out/smoke-test-*
          retention-days: 7
